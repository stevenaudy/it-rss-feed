  <path d="M60 88 Q96 44 132 88" fill="none" stroke="#58a6ff" stroke-width="6" stroke-linecap="round" opacity="0.55"/>
  <path d="M77 88 Q96 62 115 88" fill="none" stroke="#58a6ff" stroke-width="6" stroke-linecap="round" opacity="0.85"/>

  <!-- Center dot -->
